<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>عقارات برج العرب</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <style>
        :root { 
            --gold: #FFB300; 
            --bg-body: #060913; 
            --card-bg: #111827; 
            --border: rgba(255, 179, 0, 0.15); 
        }
        
        ::-webkit-scrollbar { width: 4px; } 
        ::-webkit-scrollbar-track { background: var(--bg-body); } 
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 4px; }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-body); color: #fff; overflow-x: hidden; background-image: radial-gradient(circle at top right, #111827, #060913); }

        .navbar { background: rgba(6, 9, 19, 0.9); backdrop-filter: blur(15px); height: 75px; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo { font-size: 20px; font-weight: 900; color: var(--gold); display: flex; align-items: center; gap: 8px; }
        
        .back-btn-top { background: rgba(255, 179, 0, 0.08); border: 1px solid var(--border); color: var(--gold); padding: 8px 16px; border-radius: 30px; cursor: pointer; display: none; align-items: center; gap: 8px; font-size: 12px; font-weight: bold; transition: 0.3s; }
        .back-btn-top:hover { background: var(--gold); color: #000; transform: translateY(-1px); }

        .hero-section { padding: 30px 20px 20px; text-align: center; max-width: 800px; margin: auto; }
        .title-wrapper { display: flex; align-items: center; justify-content: center; min-height: 50px; }
        .hero-section h1 { font-size: 22px; font-weight: 900; color: #fff; transition: 0.3s; }

        .container { padding: 10px 20px 60px; max-width: 1100px; margin: auto; }
        .grid-layout { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; }
        
        /* كروت الأحياء */
        .exclusive-card {
            position: relative;
            background: #111827;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.3s;
            height: 360px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .card-image-wrapper { position: absolute; inset: 0; width: 100%; height: 100%; overflow: hidden; }
        .bg-card-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; }
        .exclusive-card:hover .bg-card-img { transform: scale(1.05); }
        .card-overlay { position: absolute; inset: 0; background: linear-gradient(to top, #060913 20%, rgba(6, 9, 19, 0.6) 60%, transparent 100%); }
        .card-content-luxury { position: relative; z-index: 2; padding: 25px; text-align: right; }
        .luxury-badge { display: inline-block; background: rgba(255, 179, 0, 0.12); color: var(--gold); backdrop-filter: blur(5px); border: 1px solid rgba(255, 179, 0, 0.25); padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; margin-bottom: 8px; }
        .card-content-luxury h2 { font-size: 18px; font-weight: 900; color: #fff; margin-bottom: 4px; }
        .card-content-luxury p { font-size: 12px; color: #9CA3AF; margin-bottom: 15px; }
        .luxury-action { display: flex; align-items: center; gap: 6px; color: var(--gold); font-size: 11px; font-weight: 700; transition: gap 0.3s; }
        .exclusive-card:hover .luxury-action { gap: 10px; }
        .exclusive-card:hover { transform: translateY(-6px); border-color: var(--gold); box-shadow: 0 12px 30px rgba(255, 179, 0, 0.12); }

        /* كروت عرض البيوت الفردية */
        .property-card { background: var(--card-bg); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.4); display: flex; flex-direction: column; }
        .property-img-holder { position: relative; width: 100%; height: 230px; overflow: hidden; cursor: pointer; background: #000; }
        .property-img { width: 100%; height: 100%; object-fit: cover; transition: 0.4s; image-rendering: -webkit-optimize-contrast; }
        .property-card:hover .property-img { transform: scale(1.03); }
        .gallery-indicator { position: absolute; top: 12px; right: 12px; background: rgba(6, 9, 19, 0.8); color: #fff; border: 1px solid rgba(255, 255, 255, 0.1); padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; backdrop-filter: blur(5px); }
        
        .property-details { padding: 20px; text-align: right; }
        .property-features { display: flex; gap: 15px; margin: 12px 0; color: #9CA3AF; font-size: 13px; }
        .btn-action { background: linear-gradient(90deg, #FFB300, #FFD54F); color: #000; border: none; width: 100%; padding: 12px; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.3s; }

        /* صندوق ألبوم الصور المطور لدعم الزوم واللمس الحر الحركي */
        .gallery-modal { position: fixed; inset: 0; background: rgba(4, 6, 12, 0.98); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 10px; backdrop-filter: blur(15px); }
        .modal-container { position: relative; max-width: 900px; width: 100%; background: #111827; border: 1px solid var(--border); border-radius: 24px; overflow: hidden; display: flex; flex-direction: column; }
        .modal-close-btn { position: absolute; top: 15px; left: 15px; background: rgba(255,255,255,0.15); border: none; color: #fff; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; z-index: 10; transition: 0.3s; }
        
        /* تفعيل اللمس الحر ومنع انقطاع أطراف الكادر أثناء التكبير باليد */
        .slider-wrapper { position: relative; width: 100%; height: 480px; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; touch-action: none; }
        .slider-img { max-width: 100%; max-height: 100%; width: auto; height: auto; object-fit: contain; image-rendering: -webkit-optimize-contrast; transition: transform 0.1s ease-out, opacity 0.15s ease-in-out; transform-origin: center center; }
        
        .nav-slider { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,179,0,0.15); border: 1px solid rgba(255,179,0,0.3); color: var(--gold); width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: 0.3s; z-index: 5; }
        .nav-slider:hover { background: var(--gold); color: #000; }
        .nav-prev { right: 20px; } .nav-next { left: 20px; }
        
        .gallery-counter-tag { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.75); color: var(--gold); padding: 4px 14px; border-radius: 20px; font-size: 12px; font-weight: bold; border: 1px solid var(--border); letter-spacing: 1px; pointer-events: none; z-index: 6; }
        .thumbs-container { display: flex; gap: 10px; padding: 12px; background: #131926; overflow-x: auto; justify-content: center; border-top: 1px solid rgba(255,255,255,0.05); }
        .thumb-item { width: 65px; height: 48px; object-fit: cover; border-radius: 6px; cursor: pointer; border: 2px solid transparent; opacity: 0.4; transition: 0.3s; }
        .thumb-item.active { border-color: var(--gold); opacity: 1; transform: scale(1.05); }
    </style>
</head>
<body>

    <nav class="navbar">
        <div id="nav-brand-area" class="logo"><i class="fas fa-home"></i> عقارات برج العرب</div>
        <button id="back-btn-lux" class="back-btn-top" onclick="showNeighborhoods()"><i class="fas fa-arrow-right"></i> الرجوع للصفحة الرئيسية</button>
    </nav>

    <header class="hero-section">
        <div class="title-wrapper">
            <h1 id="main-title">اختر الحي لتصفح الفيلات والمنازل المعروضة للبيع</h1>
        </div>
    </header>

    <div class="container">
        <div class="grid-layout" id="neighborhoods-container">
            <div class="exclusive-card" data-aos="fade-up" onclick="showProperties('DISTRICT_2', 'الحي الثاني')">
                <div class="card-image-wrapper">
                    <img src="https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?auto=format&fit=crop&w=800&q=80" class="bg-card-img">
                    <div class="card-overlay"></div>
                </div>
                <div class="card-content-luxury">
                    <span class="luxury-badge">الحي الثاني</span>
                    <h2>فيلات ومنازل للبيع</h2>
                    <p>مساحات مختلفة ومواقع مميزة جاهزة للاستلام</p>
                    <div class="luxury-action"><span>عرض الفيلات والمنازل</span><i class="fas fa-arrow-left"></i></div>
                </div>
            </div>

            <div class="exclusive-card" data-aos="fade-up" data-aos-delay="100" onclick="showProperties('DISTRICT_3', 'الحي الثالث')">
                <div class="card-image-wrapper">
                    <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=800&q=80" class="bg-card-img">
                    <div class="card-overlay"></div>
                </div>
                <div class="card-content-luxury">
                    <span class="luxury-badge">الحي الثالث</span>
                    <h2>فيلات ومنازل للبيع</h2>
                    <p>خيارات سكنية متنوعة في محيط مريح وهادئ</p>
                    <div class="luxury-action"><span>عرض الفيلات والمنازل</span><i class="fas fa-arrow-left"></i></div>
                </div>
            </div>
        </div>

        <div class="grid-layout" id="properties-container" style="display:none;"></div>
    </div>

    <div class="gallery-modal" id="galleryModal">
        <div class="modal-container">
            <button class="modal-close-btn" onclick="closeGallery()"><i class="fas fa-times"></i></button>
            <div class="slider-wrapper" id="sliderWrapper">
                <button class="nav-slider nav-prev" onclick="changeSlide(1)"><i class="fas fa-chevron-right"></i></button>
                <img id="modalActiveImg" src="" class="slider-img">
                <button class="nav-slider nav-next" onclick="changeSlide(-1)"><i class="fas fa-chevron-left"></i></button>
                <div class="gallery-counter-tag" id="galleryCounterTag">0 / 0</div>
            </div>
            <div class="thumbs-container" id="modalThumbs"></div>
        </div>
    </div>

    <script>
        let globalProperties = [];
        let currentGalleryImages = [];
        let activeImageIndex = 0;
        
        // متغيرات التحكم باللمس والتكبير الحر باليد (Zoom & Swipe Variables)
        let touchStartX = 0;
        let touchEndX = 0;
        let initialPinchDistance = 0;
        let currentZoomScale = 1;
        let isZooming = false;

        window.onload = async () => {
            AOS.init({ duration: 600, once: true });
            await fetchFreshProperties();
            setupAdvancedTouchControls();
        };

        async function fetchFreshProperties() {
            try {
                const res = await fetch('/api/data');
                const data = await res.json();
                globalProperties = data.properties || [];
            } catch (err) { console.error(err); }
        }

        function showNeighborhoods() {
            document.getElementById('back-btn-lux').style.display = 'none';
            document.getElementById('nav-brand-area').style.display = 'flex';
            document.getElementById('properties-container').style.display = 'none';
            document.getElementById('main-title').innerText = "اختر الحي لتصفح الفيلات والمنازل المعروضة للبيع";
            document.getElementById('neighborhoods-container').style.display = 'grid';
        }

        async function showProperties(neighborhoodId, fullName) {
            document.getElementById('main-title').innerText = fullName;
            document.getElementById('nav-brand-area').style.display = 'none';
            document.getElementById('back-btn-lux').style.display = 'flex';
            
            document.getElementById('neighborhoods-container').style.display = 'none';
            const container = document.getElementById('properties-container');
            container.style.display = 'grid';
            container.innerHTML = `<h3 style="grid-column:1/-1; text-align:center; color:var(--gold); padding:20px;">جاري عرض المنازل الحية...</h3>`;

            await fetchFreshProperties();

            const filtered = globalProperties.filter(p => p.neighborhoodId === neighborhoodId);
            if(filtered.length === 0) {
                container.innerHTML = `<h3 style="grid-column:1/-1; text-align:center; color:#9CA3AF; padding:50px; font-size:14px;">لا توجد عروض متاحة حالياً.</h3>`;
                return;
            }

            container.innerHTML = filtered.map((p, i) => {
                const totalPhotos = 1 + (p.images_gallery ? p.images_gallery.length : 0);
                const formattedPrice = p.price ? parseInt(p.price).toLocaleString() : '0';
                
                return `
                <div class="property-card" data-aos="fade-up" data-aos-delay="${i*50}">
                    <div class="property-img-holder" onclick="openGallery('${p.id}')">
                        <img src="${p.image || 'https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?auto=format&fit=crop&w=600&q=80'}" class="property-img">
                        <div class="gallery-indicator"><i class="fas fa-images"></i> عرض الـ ${totalPhotos} صور بدقة كاملة</div>
                    </div>
                    <div class="property-details">
                        <h2 style="font-size:16px; font-weight:700; margin-bottom:8px; color:#fff;">${p.title}</h2>
                        <div class="property-features">
                            <span><i class="fas fa-bed"></i> ${p.beds || 0} غرف</span>
                            <span><i class="fas fa-expand-arrows-alt"></i> ${p.area || 0} م²</span>
                        </div>
                        <h3 style="color:var(--gold); font-size:18px; margin-bottom:15px; font-weight:700;">${formattedPrice} EGP</h3>
                        <button class="btn-action" onclick="requestInspection('${p.title}', '${formattedPrice}')"><i class="fas fa-calendar-check"></i> طلب معاينة</button>
                    </div>
                </div>
            `}).join('');
        }

        function openGallery(propertyId) {
            const prop = globalProperties.find(p => p.id === propertyId);
            if(!prop) return;
            
            currentGalleryImages = [prop.image];
            if(prop.images_gallery && prop.images_gallery.length > 0) {
                currentGalleryImages = currentGalleryImages.concat(prop.images_gallery);
            }
            
            activeImageIndex = 0;
            resetZoom();
            document.getElementById('galleryModal').style.display = 'flex';
            updateModalImage();
        }

        function closeGallery() {
            document.getElementById('galleryModal').style.display = 'none';
            resetZoom();
        }

        function updateModalImage() {
            const activeImg = document.getElementById('modalActiveImg');
            resetZoom();
            activeImg.style.opacity = '0.3';
            
            setTimeout(() => {
                activeImg.src = currentGalleryImages[activeImageIndex];
                activeImg.style.opacity = '1';
            }, 50);
            
            document.getElementById('galleryCounterTag').innerText = `${activeImageIndex + 1} / ${currentGalleryImages.length}`;
            
            const thumbsContainer = document.getElementById('modalThumbs');
            if (currentGalleryImages.length <= 1) {
                thumbsContainer.style.display = 'none';
                document.querySelectorAll('.nav-slider').forEach(n => n.style.display = 'none');
            } else {
                thumbsContainer.style.display = 'flex';
                document.querySelectorAll('.nav-slider').forEach(n => n.style.display = 'flex');
                thumbsContainer.innerHTML = currentGalleryImages.map((img, idx) => `
                    <img src="${img}" class="thumb-item ${idx === activeImageIndex ? 'active' : ''}" onclick="setSlide(${idx})">
                `).join('');
            }
        }

        function changeSlide(dir) {
            activeImageIndex += dir;
            if(activeImageIndex >= currentGalleryImages.length) activeImageIndex = 0;
            if(activeImageIndex < 0) activeImageIndex = currentGalleryImages.length - 1;
            updateModalImage();
        }

        function setSlide(idx) {
            activeImageIndex = idx;
            updateModalImage();
        }

        function resetZoom() {
            currentZoomScale = 1;
            isZooming = false;
            const activeImg = document.getElementById('modalActiveImg');
            if(activeImg) activeImg.style.transform = `scale(1)`;
        }

        // هندسة مستشعرات اللمس الحر المتكاملة للزوم والسحب بالأصابع
        function setupAdvancedTouchControls() {
            const wrapper = document.getElementById('sliderWrapper');
            const activeImg = document.getElementById('modalActiveImg');
            
            wrapper.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    // تسجيل نقطة البداية للسحب العادي
                    touchStartX = e.touches[0].screenX;
                    isZooming = false;
                } else if (e.touches.length === 2) {
                    // تسجيل نقطة البداية للتكبير بأصبعين (Pinch)
                    isZooming = true;
                    initialPinchDistance = Math.hypot(
                        e.touches[0].screenX - e.touches[1].screenX,
                        e.touches[0].screenY - e.touches[1].screenY
                    );
                }
            }, { passive: true });
            
            wrapper.addEventListener('touchmove', (e) => {
                if (isZooming && e.touches.length === 2) {
                    // احتساب حجم التكبير المباشر بناء على حركة الأصابع
                    const currentDistance = Math.hypot(
                        e.touches[0].screenX - e.touches[1].screenX,
                        e.touches[0].screenY - e.touches[1].screenY
                    );
                    let factor = currentDistance / initialPinchDistance;
                    let newScale = currentZoomScale * factor;
                    
                    // وضع حدود أمان للتكبير (من 1x إلى 4x كحد أقصى لمنع خروج الصورة)
                    if (newScale >= 1 && newScale <= 4) {
                        activeImg.style.transform = `scale(${newScale})`;
                    }
                }
            }, { passive: true });
            
            wrapper.addEventListener('touchend', (e) => {
                if (isZooming) {
                    // حفظ حالة التكبير الأخيرة عند رفع الأصابع
                    const transformMatrix = window.getComputedStyle(activeImg).transform;
                    if (transformMatrix !== 'none') {
                        currentZoomScale = parseFloat(transformMatrix.split(',')[0].replace('matrix(', ''));
                    }
                    // إذا صغرت الصورة عن الحجم الطبيعي، أرجعها لـ 1x تلقائياً
                    if(currentZoomScale < 1.1) resetZoom();
                } else {
                    // معالجة السحب لليمين واليسار للتنقل بين البيوت إذا كانت الصورة بحجمها الطبيعي
                    if (currentZoomScale <= 1) {
                        touchEndX = e.changedTouches[0].screenX;
                        const swipeThreshold = 50;
                        if (touchStartX - touchEndX > swipeThreshold) {
                            changeSlide(-1); // الصورة التالية
                        } else if (touchEndX - touchStartX > swipeThreshold) {
                            changeSlide(1);  // الصورة السابقة
                        }
                    }
                }
            }, { passive: true });
        }

        async function requestInspection(title, price) {
            const leadId = "REQ-" + Math.floor(1000 + Math.random() * 9000);
            const { value: formValues } = await Swal.fire({
                title: `<span style="font-size:17px; color:var(--gold); font-weight:700;">طلب حجز ومعاينة</span>`,
                background: '#111827', color: '#fff', confirmButtonColor: '#FFB300', confirmButtonText: 'إرسال الطلب',
                html: `
                    <p style="font-size:12px; color:#9CA3AF; margin-bottom:15px;">${title}</p>
                    <input id="swal-name" class="swal2-input" placeholder="الاسم بالكامل" style="color:#fff; background:#060913; border:1px solid #374151; border-radius:8px;">
                    <input id="swal-phone" class="swal2-input" placeholder="رقم الهاتف للتواصل" style="color:#fff; background:#060913; border:1px solid #374151; border-radius:8px;">
                `,
                preConfirm: () => {
                    const name = document.getElementById('swal-name').value;
                    const phone = document.getElementById('swal-phone').value;
                    if (!name || !phone) return Swal.showValidationMessage('يرجى كتابة الاسم ورقم الهاتف');
                    return { name, phone };
                }
            });

            if (formValues) {
                try {
                    await fetch('/api/action', {
                        method: 'POST', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ action: 'new_lead', lead: { leadId, propertyTitle: title, price, clientName: formValues.name, clientPhone: formValues.phone } })
                    });
                    Swal.fire({ icon: 'success', title: 'تم تسجيل الطلب', text: 'سنتواصل معك في أقرب وقت لترتيب موعد المعاينة السكنية.', confirmButtonColor: '#10B981', background: '#111827', color: '#fff' });
                } catch(err) { console.error(err); }
            }
        }
    </script>
</body>
</html>
